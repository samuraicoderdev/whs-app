<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NxWarehouse</title>
    <meta name="description" content="Sistema de Gestión de Almacenes con módulo de Picking, Inventario y CRM.">
    <meta name="keywords" content="Sistema de Gestión de Almacenes, Picking, Inventario, CRM">
    <meta name="author" content="NxWarehouse">
    <meta name="robots" content="index, follow">
    <meta name="googlebot" content="index, follow">
    <meta name="google" content="notranslate">
    <meta name="google" content="notranslate">
    <link rel="manifest" href="/manifest.json">
  </head>
  <body>
    <main id="root" class="flex h-screen bg-slate-50 font-sans text-slate-700 overflow-hidden selection:bg-blue-500/30"></main>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            })
            .catch(err => {
              console.log('ServiceWorker registration failed: ', err);
            });
        });
      }
    </script>
  </body>
</html>
